<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¿Qué comemos?</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
    }

    #app {
      width: 100vw;
      height: 100dvh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: opacity 0.8s ease;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.15) 0%,
        rgba(0, 0, 0, 0.55) 100%
      );
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #fff;
      padding: 2rem;
      user-select: none;
    }

    .meal-type {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: clamp(0.7rem, 2vw, 1rem);
      font-weight: 500;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0.75;
      margin-bottom: 0.75rem;
    }

    .meal-name {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: clamp(2.5rem, 9vw, 7rem);
      font-weight: 800;
      line-height: 1.05;
      text-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
      letter-spacing: -0.02em;
    }

    .clock {
      margin-top: 1.5rem;
      font-family: ui-monospace, monospace;
      font-size: clamp(0.75rem, 1.5vw, 0.9rem);
      opacity: 0.45;
      letter-spacing: 0.15em;
    }

    /* Estado "fuera de horario" */
    #app.offhours #bg {
      background-image: none !important;
    }
    #app.offhours {
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    }
    #app.offhours #roll-btn {
      display: none;
    }

    /* ── Botón roll ── */
    #roll-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow:
        0 0 18px rgba(255, 255, 255, 0.08),
        0 0 6px  rgba(255, 255, 255, 0.06),
        inset 0 0 12px rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.6);
      z-index: 10;
      transition:
        transform 0.12s ease,
        box-shadow 0.2s ease,
        color 0.2s ease;
      /* evitar selección de texto al clickear rápido */
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #roll-btn:hover {
      color: rgba(255, 255, 255, 0.9);
      box-shadow:
        0 0 28px rgba(255, 255, 255, 0.16),
        0 0 10px rgba(255, 255, 255, 0.10),
        inset 0 0 16px rgba(255, 255, 255, 0.06);
    }

    #roll-btn:hover .btn-icon {
      animation: spin-icon 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Se agranda al presionar */
    #roll-btn:active,
    #roll-btn.pressed {
      transform: scale(1.18);
    }

    #roll-btn .btn-icon {
      display: block;
      width: 22px;
      height: 22px;
    }

    @keyframes spin-icon {
      0%   { transform: rotate(0deg)   scale(1);    }
      50%  { transform: rotate(140deg) scale(1.15); }
      100% { transform: rotate(180deg) scale(1);    }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="meal-type" id="meal-type"></div>
    <div class="meal-name" id="meal-name">Cargando…</div>
    <div class="clock" id="clock"></div>
  </div>
</div>

<!-- Botón roll -->
<button id="roll-btn" title="Otra opción" aria-label="Mostrar otra comida">
  <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="17 1 21 5 17 9"/>
    <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
    <polyline points="7 23 3 19 7 15"/>
    <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
  </svg>
</button>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIGURACIÓN — editá esto a tu gusto
// ═══════════════════════════════════════════════════════════════

/** Rangos horarios para cada tipo de comida (hora del día, 0-23) */
const HORARIOS = {
  desayuno: { desde: 6,  hasta: 11 },
  almuerzo: { desde: 11, hasta: 16 },
  cena:     { desde: 18, hasta: 23 },
};

/**
 * Menú semanal predefinido.
 * Clave: día de la semana (0 = domingo, 1 = lunes … 6 = sábado)
 * Si un día/comida no está definido aquí, se elige aleatoriamente de OPCIONES.
 *
 * Ejemplo:
 *   1: {  // Lunes
 *     desayuno: { nombre: "Tostadas con huevo", imagen: "https://..." },
 *     almuerzo: { nombre: "Milanesa con papas", imagen: "https://..." },
 *     cena:     { nombre: "Sopa de verduras",   imagen: "https://..." },
 *   },
 */
const MENU_SEMANAL = {
  // Descomentá y completá los días que quieras fijar:
  //
  // 0: { // Domingo
  //   desayuno: { nombre: "Medialunas", imagen: "https://..." },
  // },
};

/**
 * Lista de opciones por tipo de comida.
 * Se usa cuando el día/comida no está en MENU_SEMANAL.
 * La elección es aleatoria pero estable durante todo el día
 * (misma comida si recargás la página).
 * El botón de roll cicla entre las opciones disponibles.
 */
const OPCIONES = {
  desayuno: [
    { nombre: "Pan con palta",      imagen: "img/desayuno/pan-con-palta-bebida-caliente.png" },
    { nombre: "Quesadillas y huevo",imagen: "img/desayuno/quesadillas-huevo.png" },
    // Agregá más desayunos acá:
    // { nombre: "Huevos revueltos", imagen: "img/desayuno/huevos-revueltos.png" },
  ],
  almuerzo: [
    { nombre: "Carne con puré",     imagen: "img/almuerzo/carne-con-pure.png" },
    { nombre: "Fideos con salsa",   imagen: "img/almuerzo/fideos-con-salsa.png" },
    { nombre: "Pollo con arroz",    imagen: "img/almuerzo/pollo-con-arroz.png" },
    { nombre: "Porotos",            imagen: "img/almuerzo/porotos.png" },
    // Agregá más almuerzos acá:
    // { nombre: "Milanesa",         imagen: "img/almuerzo/milanesa.png" },
  ],
  cena: [
    { nombre: "Pan con palta",      imagen: "img/cena/pan-con-palta-bebida-caliente.png" },
    { nombre: "Galletas con atún",  imagen: "img/cena/galletas-con-atun.png" },
    { nombre: "Quesadillas y huevo",imagen: "img/cena/quesadillas-huevo.png" },
    // Agregá más cenas acá:
    // { nombre: "Sopa",             imagen: "img/cena/sopa.png" },
  ],
};

// ═══════════════════════════════════════════════════════════════
//  LÓGICA — no hace falta editar nada de acá para abajo
// ═══════════════════════════════════════════════════════════════

/** Pseudo-random estable dado un seed numérico */
function seededRandom(seed) {
  const x = Math.sin(seed + 1) * 10000;
  return x - Math.floor(x);
}

/** Devuelve el tipo de comida para una hora dada, o null si está fuera de horario */
function getTipoComida(hora) {
  for (const [tipo, { desde, hasta }] of Object.entries(HORARIOS)) {
    if (hora >= desde && hora < hasta) return tipo;
  }
  return null;
}

/** Lee el offset de roll guardado para hoy. Resetea si cambió el día. */
function getRollOffset(tipo) {
  const hoy = new Date().toISOString().slice(0, 10);
  try {
    const stored = JSON.parse(localStorage.getItem('roll') || '{}');
    if (stored.fecha !== hoy) return 0;
    return stored[tipo] ?? 0;
  } catch { return 0; }
}

/** Guarda el offset de roll para el tipo de comida actual */
function saveRollOffset(tipo, offset) {
  const hoy = new Date().toISOString().slice(0, 10);
  try {
    const stored = JSON.parse(localStorage.getItem('roll') || '{}');
    const next = stored.fecha === hoy ? { ...stored } : { fecha: hoy };
    next[tipo] = offset;
    localStorage.setItem('roll', JSON.stringify(next));
  } catch {}
}

/** Elige una comida de la lista de forma estable (seed por día + offset de roll) */
function getComidaAleatoria(tipo, fecha, rollOffset) {
  const opciones = OPCIONES[tipo];
  const seed =
    fecha.getFullYear() * 10000 +
    (fecha.getMonth() + 1) * 100 +
    fecha.getDate() +
    { desayuno: 1, almuerzo: 2, cena: 3 }[tipo];
  const baseIdx = Math.floor(seededRandom(seed) * opciones.length);
  return opciones[(baseIdx + rollOffset) % opciones.length];
}

function render(rollOffset) {
  const ahora   = new Date();
  const hora    = ahora.getHours();
  const dia     = ahora.getDay();
  const tipo    = getTipoComida(hora);

  const appEl   = document.getElementById('app');
  const bgEl    = document.getElementById('bg');
  const typeEl  = document.getElementById('meal-type');
  const nameEl  = document.getElementById('meal-name');
  const clockEl = document.getElementById('clock');

  clockEl.textContent = ahora.toLocaleTimeString('es-ES', {
    hour: '2-digit',
    minute: '2-digit',
  });

  if (!tipo) {
    appEl.classList.add('offhours');
    typeEl.textContent = '';
    nameEl.textContent = '¡A descansar!';
    bgEl.style.backgroundImage = '';
    return;
  }

  appEl.classList.remove('offhours');

  const labels  = { desayuno: 'Desayuno', almuerzo: 'Almuerzo', cena: 'Cena' };
  const offset  = rollOffset ?? getRollOffset(tipo);
  const comida  = MENU_SEMANAL[dia]?.[tipo] ?? getComidaAleatoria(tipo, ahora, offset);

  typeEl.textContent = labels[tipo];
  nameEl.textContent = comida.nombre;
  bgEl.style.backgroundImage = `url('${comida.imagen}')`;
}

// ── Botón roll ──────────────────────────────────────────────────
const rollBtn = document.getElementById('roll-btn');

rollBtn.addEventListener('mouseup', handleRoll);
rollBtn.addEventListener('touchend', (e) => { e.preventDefault(); handleRoll(); });

function handleRoll() {
  const ahora = new Date();
  const tipo  = getTipoComida(ahora.getHours());
  if (!tipo) return;

  // Si el día está fijado en MENU_SEMANAL, el botón no hace nada
  if (MENU_SEMANAL[ahora.getDay()]?.[tipo]) return;

  const opciones   = OPCIONES[tipo];
  const oldOffset  = getRollOffset(tipo);
  const newOffset  = (oldOffset + 1) % opciones.length;

  saveRollOffset(tipo, newOffset);
  render(newOffset);
}

// ── Inicio ──────────────────────────────────────────────────────
render();

// Actualizar el reloj cada minuto
setInterval(() => {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('es-ES', {
    hour: '2-digit',
    minute: '2-digit',
  });
}, 60_000);
</script>
</body>
</html>
